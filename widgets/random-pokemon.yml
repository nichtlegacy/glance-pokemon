      .accent-primary-normal{--pokemon-accent-primary:rgba(168,167,122,0.3);--pokemon-accent-primary-soft:rgba(168,167,122,0.14)}
      .accent-primary-fire{--pokemon-accent-primary:rgba(238,129,48,0.32);--pokemon-accent-primary-soft:rgba(238,129,48,0.16)}
      .accent-primary-water{--pokemon-accent-primary:rgba(99,144,240,0.32);--pokemon-accent-primary-soft:rgba(99,144,240,0.16)}
      .accent-primary-electric{--pokemon-accent-primary:rgba(247,208,44,0.3);--pokemon-accent-primary-soft:rgba(247,208,44,0.14)}
      .accent-primary-grass{--pokemon-accent-primary:rgba(122,199,76,0.32);--pokemon-accent-primary-soft:rgba(122,199,76,0.16)}
      .accent-primary-ice{--pokemon-accent-primary:rgba(150,217,214,0.28);--pokemon-accent-primary-soft:rgba(150,217,214,0.14)}
      .accent-primary-fighting{--pokemon-accent-primary:rgba(194,46,40,0.32);--pokemon-accent-primary-soft:rgba(194,46,40,0.16)}
      .accent-primary-poison{--pokemon-accent-primary:rgba(163,62,161,0.32);--pokemon-accent-primary-soft:rgba(163,62,161,0.16)}
      .accent-primary-ground{--pokemon-accent-primary:rgba(226,191,101,0.3);--pokemon-accent-primary-soft:rgba(226,191,101,0.14)}
      .accent-primary-flying{--pokemon-accent-primary:rgba(169,143,243,0.3);--pokemon-accent-primary-soft:rgba(169,143,243,0.14)}
      .accent-primary-psychic{--pokemon-accent-primary:rgba(249,85,135,0.32);--pokemon-accent-primary-soft:rgba(249,85,135,0.16)}
      .accent-primary-bug{--pokemon-accent-primary:rgba(166,185,26,0.3);--pokemon-accent-primary-soft:rgba(166,185,26,0.14)}
      .accent-primary-rock{--pokemon-accent-primary:rgba(182,161,54,0.3);--pokemon-accent-primary-soft:rgba(182,161,54,0.14)}
      .accent-primary-ghost{--pokemon-accent-primary:rgba(115,87,151,0.32);--pokemon-accent-primary-soft:rgba(115,87,151,0.16)}
      .accent-primary-dragon{--pokemon-accent-primary:rgba(111,53,252,0.34);--pokemon-accent-primary-soft:rgba(111,53,252,0.18)}
      .accent-primary-dark{--pokemon-accent-primary:rgba(112,87,70,0.3);--pokemon-accent-primary-soft:rgba(112,87,70,0.14)}
      .accent-primary-steel{--pokemon-accent-primary:rgba(183,183,206,0.28);--pokemon-accent-primary-soft:rgba(183,183,206,0.14)}
      .accent-primary-fairy{--pokemon-accent-primary:rgba(214,133,173,0.3);--pokemon-accent-primary-soft:rgba(214,133,173,0.14)}
      .accent-primary-stellar{--pokemon-accent-primary:rgba(68,102,255,0.34);--pokemon-accent-primary-soft:rgba(68,102,255,0.18)}
      .accent-primary-shadow{--pokemon-accent-primary:rgba(90,90,120,0.32);--pokemon-accent-primary-soft:rgba(90,90,120,0.16)}
      .accent-primary-unknown{--pokemon-accent-primary:rgba(107,114,128,0.3);--pokemon-accent-primary-soft:rgba(107,114,128,0.14)}

      .accent-primary-electric,
      .accent-primary-ice,
      .accent-primary-ground,
      .accent-primary-steel,
      .accent-primary-normal,
      .accent-primary-fairy {
        --pokemon-art-shadow: rgba(0, 0, 0, 0.16);
      }

      .accent-primary-dark,
      .accent-primary-ghost,
      .accent-primary-dragon,
      .accent-primary-shadow,
      .accent-primary-poison,
      .accent-primary-psychic,
      .accent-primary-fire,
      .accent-primary-fighting {
        --pokemon-art-shadow: rgba(0, 0, 0, 0.28);
      }

      .accent-primary-water,
      .accent-primary-grass,
      .accent-primary-bug,
      .accent-primary-rock,
      .accent-primary-flying,
      .accent-primary-stellar,
      .accent-primary-unknown {
        --pokemon-art-shadow: rgba(0, 0, 0, 0.22);
      }

      .accent-secondary-normal{--pokemon-accent-secondary:rgba(168,167,122,0.22)}
      .accent-secondary-fire{--pokemon-accent-secondary:rgba(238,129,48,0.24)}
      .accent-secondary-water{--pokemon-accent-secondary:rgba(99,144,240,0.24)}
      .accent-secondary-electric{--pokemon-accent-secondary:rgba(247,208,44,0.22)}
      .accent-secondary-grass{--pokemon-accent-secondary:rgba(122,199,76,0.24)}
      .accent-secondary-ice{--pokemon-accent-secondary:rgba(150,217,214,0.2)}
      .accent-secondary-fighting{--pokemon-accent-secondary:rgba(194,46,40,0.24)}
      .accent-secondary-poison{--pokemon-accent-secondary:rgba(163,62,161,0.24)}
      .accent-secondary-ground{--pokemon-accent-secondary:rgba(226,191,101,0.22)}
      .accent-secondary-flying{--pokemon-accent-secondary:rgba(169,143,243,0.22)}
      .accent-secondary-psychic{--pokemon-accent-secondary:rgba(249,85,135,0.24)}
      .accent-secondary-bug{--pokemon-accent-secondary:rgba(166,185,26,0.22)}
      .accent-secondary-rock{--pokemon-accent-secondary:rgba(182,161,54,0.22)}
      .accent-secondary-ghost{--pokemon-accent-secondary:rgba(115,87,151,0.24)}
      .accent-secondary-dragon{--pokemon-accent-secondary:rgba(111,53,252,0.26)}
      .accent-secondary-dark{--pokemon-accent-secondary:rgba(112,87,70,0.22)}
      .accent-secondary-steel{--pokemon-accent-secondary:rgba(183,183,206,0.2)}
      .accent-secondary-fairy{--pokemon-accent-secondary:rgba(214,133,173,0.22)}
      .accent-secondary-stellar{--pokemon-accent-secondary:rgba(68,102,255,0.26)}
      .accent-secondary-shadow{--pokemon-accent-secondary:rgba(90,90,120,0.24)}
      .accent-secondary-unknown{--pokemon-accent-secondary:rgba(107,114,128,0.22)}
    </style>

    {{ if ne $randomStatus 200 }}
      <div class="text-center margin-block-3">
        <div class="color-negative size-h4">Random Pokédex unavailable</div>
        <div class="color-subdue size-h6">A random Pokémon ID could not be generated right now.</div>
        <div class="color-subdue size-h6">HTTP {{ $randomStatus }}</div>
      </div>
    {{ else if le $pokemonId 0 }}
      <div class="text-center margin-block-3">
        <div class="color-primary size-h4">No Pokémon returned</div>
        <div class="color-subdue size-h6">The random ID service responded successfully, but no usable Pokémon ID was returned.</div>
      </div>
    {{ end }}
    {{ if and (eq $randomStatus 200) (gt $pokemonId 0) }}
      {{ $pokemon := newRequest (concat "https://pokeapi.co/api/v2/pokemon/" (printf "%d" $pokemonId)) | getResponse }}
      {{ if eq $pokemon.Response.StatusCode 200 }}
        {{ $species := newRequest (concat "https://pokeapi.co/api/v2/pokemon-species/" (printf "%d" $pokemonId)) | getResponse }}
        {{ $speciesOK := eq $species.Response.StatusCode 200 }}
        {{ $isLegendary := false }}
        {{ $isMythical := false }}
        {{ $localizedNames := $species.JSON.Array "names" }}
        {{ $englishName := $pokemon.JSON.String "name" }}
        {{ $displayName := $englishName }}
        {{ $selectedLanguageFound := false }}
        {{ $hasLocalizedNames := and $speciesOK (gt (len $localizedNames) 0) }}
        {{ if $speciesOK }}
          {{ $isLegendary = $species.JSON.Bool "is_legendary" }}
          {{ $isMythical = $species.JSON.Bool "is_mythical" }}
          {{ range $localizedNames }}
            {{ if eq (.String "language.name") "en" }}{{ $englishName = .String "name" }}{{ end }}
            {{ if or (eq (.String "language.name") $selectedLanguage) (eq (.String "language.name") $selectedLanguageAlt1) (eq (.String "language.name") $selectedLanguageAlt2) (eq (.String "language.name") $selectedLanguageAlt3) }}
              {{ $displayName = .String "name" }}
              {{ $selectedLanguageFound = true }}
            {{ end }}
          {{ end }}
        {{ end }}
        {{ if or (eq $selectedLanguage "en") (not $selectedLanguageFound) }}{{ $displayName = $englishName }}{{ end }}
        {{ $types := $pokemon.JSON.Array "types" }}
        {{ $primaryType := "" }}
        {{ $secondaryType := "" }}
        {{ range $i, $type := $types }}
          {{ if eq ($type.Int "slot") 1 }}{{ $primaryType = $type.String "type.name" }}{{ end }}
          {{ if eq ($type.Int "slot") 2 }}{{ $secondaryType = $type.String "type.name" }}{{ end }}
        {{ end }}
        {{ if eq $primaryType "" }}{{ $primaryType = $pokemon.JSON.String "types.0.type.name" }}{{ end }}
        {{ if eq $secondaryType "" }}{{ $secondaryType = $primaryType }}{{ end }}
        {{ $officialArtwork := $pokemon.JSON.String "sprites.other.official-artwork.front_default" }}
        {{ $artwork := $officialArtwork }}
        {{ if eq $artwork "" }}{{ $artwork = $pokemon.JSON.String "sprites.front_default" }}{{ end }}
        {{ $officialArtworkShiny := $pokemon.JSON.String "sprites.other.official-artwork.front_shiny" }}
        {{ $homeArtwork := $pokemon.JSON.String "sprites.other.home.front_default" }}
        {{ $homeArtworkShiny := $pokemon.JSON.String "sprites.other.home.front_shiny" }}
        {{ $dreamWorldArtwork := $pokemon.JSON.String "sprites.other.dream_world.front_default" }}
        {{ $cryLatest := $pokemon.JSON.String "cries.latest" }}
        {{ $cryLegacy := $pokemon.JSON.String "cries.legacy" }}
        {{ $selectedFlavorText := "" }}
        {{ $englishFlavorText := "" }}
        {{ $selectedFlavorTextAlt1 := "" }}
        {{ $selectedFlavorTextAlt2 := "" }}
        {{ $selectedFlavorTextAlt3 := "" }}
        {{ $selectedGenus := "" }}
        {{ $englishGenus := "" }}
        {{ $captureRateLabel := "" }}
        {{ $genderLabel := "" }}
        {{ $formsLabel := "" }}
        {{ if $speciesOK }}
          {{ $captureRateRaw := $species.JSON.Int "capture_rate" }}
          {{ $captureRatePct := mul (div (toFloat $captureRateRaw) 255.0) 100.0 }}
          {{ $captureRateLabel = printf "%d/255 · %.1f%%" $captureRateRaw $captureRatePct }}
          {{ range $species.JSON.Array "flavor_text_entries" }}
            {{ $entryLang := .String "language.name" }}
            {{ $entryText := .String "flavor_text" }}
            {{ if and (eq $entryLang "en") (eq $englishFlavorText "") }}
              {{ $englishFlavorText = $entryText }}
            {{ end }}
            {{ if and (eq $entryLang $selectedLanguage) (eq $selectedFlavorText "") }}
              {{ $selectedFlavorText = $entryText }}
            {{ else if and (eq $entryLang $selectedLanguageAlt1) (eq $selectedFlavorTextAlt1 "") }}
              {{ $selectedFlavorTextAlt1 = $entryText }}
            {{ else if and (eq $entryLang $selectedLanguageAlt2) (eq $selectedFlavorTextAlt2 "") }}
              {{ $selectedFlavorTextAlt2 = $entryText }}
            {{ else if and (eq $entryLang $selectedLanguageAlt3) (eq $selectedFlavorTextAlt3 "") }}
              {{ $selectedFlavorTextAlt3 = $entryText }}
            {{ end }}
          {{ end }}
          {{ $selectedGenusPriority := 999 }}
          {{ range $species.JSON.Array "genera" }}
            {{ $entryLang := .String "language.name" }}
            {{ if eq $entryLang "en" }}{{ $englishGenus = .String "genus" }}{{ end }}
            {{ if eq $entryLang $selectedLanguage }}
              {{ $selectedGenus = .String "genus" }}
              {{ $selectedGenusPriority = 0 }}
            {{ else if and (gt $selectedGenusPriority 1) (eq $entryLang $selectedLanguageAlt1) }}
              {{ $selectedGenus = .String "genus" }}
              {{ $selectedGenusPriority = 1 }}
            {{ else if and (gt $selectedGenusPriority 2) (eq $entryLang $selectedLanguageAlt2) }}
              {{ $selectedGenus = .String "genus" }}
              {{ $selectedGenusPriority = 2 }}
            {{ else if and (gt $selectedGenusPriority 3) (eq $entryLang $selectedLanguageAlt3) }}
              {{ $selectedGenus = .String "genus" }}
              {{ $selectedGenusPriority = 3 }}
            {{ end }}
          {{ end }}
          {{ $genderRate := $species.JSON.Int "gender_rate" }}
          {{ if eq $genderRate -1 }}
            {{ $genderLabel = "⚲ Genderless" }}
          {{ else if eq $genderRate 0 }}
            {{ $genderLabel = "♂ Male only" }}
          {{ else if eq $genderRate 8 }}
            {{ $genderLabel = "♀ Female only" }}
          {{ else }}
            {{ $femalePct := mul (toFloat $genderRate) 12.5 }}
            {{ $malePct := sub 100.0 $femalePct }}
            {{ $genderLabel = printf "♂ %.1f%% / ♀ %.1f%%" $malePct $femalePct }}
          {{ end }}
        {{ end }}
        {{ if eq $selectedFlavorText "" }}{{ $selectedFlavorText = $selectedFlavorTextAlt1 }}{{ end }}
        {{ if eq $selectedFlavorText "" }}{{ $selectedFlavorText = $selectedFlavorTextAlt2 }}{{ end }}
        {{ if eq $selectedFlavorText "" }}{{ $selectedFlavorText = $selectedFlavorTextAlt3 }}{{ end }}
        {{ if eq $selectedFlavorText "" }}{{ $selectedFlavorText = $englishFlavorText }}{{ end }}
        {{ if eq $selectedGenus "" }}{{ $selectedGenus = $englishGenus }}{{ end }}
        {{ $selectedFlavorText = replaceAll "\n" " " $selectedFlavorText }}
        {{ $selectedFlavorText = replaceAll "\f" " " $selectedFlavorText }}
        {{ $formCount := len ($pokemon.JSON.Array "forms") }}
        {{ if gt $formCount 1 }}{{ $formsLabel = printf "%d variants" $formCount }}{{ end }}
        {{ $generationLabel := "" }}
        {{ $generationName := $species.JSON.String "generation.name" }}
        {{ if eq $generationName "generation-i" }}{{ $generationLabel = "Gen I" }}
        {{ else if eq $generationName "generation-ii" }}{{ $generationLabel = "Gen II" }}
        {{ else if eq $generationName "generation-iii" }}{{ $generationLabel = "Gen III" }}
        {{ else if eq $generationName "generation-iv" }}{{ $generationLabel = "Gen IV" }}
        {{ else if eq $generationName "generation-v" }}{{ $generationLabel = "Gen V" }}
        {{ else if eq $generationName "generation-vi" }}{{ $generationLabel = "Gen VI" }}
        {{ else if eq $generationName "generation-vii" }}{{ $generationLabel = "Gen VII" }}
        {{ else if eq $generationName "generation-viii" }}{{ $generationLabel = "Gen VIII" }}
        {{ else if eq $generationName "generation-ix" }}{{ $generationLabel = "Gen IX" }}
        {{ end }}
        {{ $hasArtworkGallery := or (ne $officialArtwork "") (ne $officialArtworkShiny "") (ne $homeArtwork "") (ne $homeArtworkShiny "") (ne $dreamWorldArtwork "") }}
        {{ $hasCryBlock := or (ne $cryLatest "") (ne $cryLegacy "") }}
        {{ $hasArtworkMeta := or (ne $selectedGenus "") (ne $generationLabel "") (ne $captureRateLabel "") (ne $genderLabel "") (ne $formsLabel "") }}
        {{ $hasArtworkPopover := or $hasArtworkGallery $hasCryBlock (ne $selectedFlavorText "") $hasArtworkMeta }}

        <div class="widget-small-content-bounds">
          <div class="pokemon-card accent-primary-{{ $primaryType }} accent-secondary-{{ $secondaryType }}">
            <div
              class="pokemon-art-wrap{{ if $hasArtworkPopover }} has-popover{{ end }}"
              {{ if $hasArtworkPopover }}data-popover-type="html" data-popover-position="above" data-popover-max-width="26rem" data-popover-show-delay="250"{{ end }}
            >
              <img class="pokemon-art" src="{{ $artwork | safeURL }}" alt="{{ $displayName }}" loading="lazy" onerror="this.src='{{ $pokemon.JSON.String "sprites.front_default" }}'"/>
              {{ if $hasArtworkPopover }}
                <span data-popover-html>
                  <span class="pokemon-art-popover">
                    <span class="pokemon-art-popover-header">
                      <span class="pokemon-art-popover-title">{{ $displayName }}</span>
                      <span class="pokemon-art-popover-number">#{{ printf "%03d" ($pokemon.JSON.Int "id") }}</span>
                    </span>
                    <span class="pokemon-name-popover-divider"></span>
                    {{ if $hasArtworkGallery }}
                      <span class="pokemon-art-grid">
                        {{ if ne $officialArtwork "" }}
                          <span class="pokemon-art-tile">
                            <span class="pokemon-art-tile-media">
                              <img src="{{ $officialArtwork | safeURL }}" alt="" loading="lazy" />
                            </span>
                            <span class="pokemon-art-tile-label">Official</span>
                          </span>
                        {{ end }}
                        {{ if ne $officialArtworkShiny "" }}
                          <span class="pokemon-art-tile">
                            <span class="pokemon-art-tile-media">
                              <img src="{{ $officialArtworkShiny | safeURL }}" alt="" loading="lazy" />
                            </span>
                            <span class="pokemon-art-tile-label">Official Shiny</span>
                          </span>
                        {{ end }}
                        {{ if ne $homeArtwork "" }}
                          <span class="pokemon-art-tile">
                            <span class="pokemon-art-tile-media">
                              <img src="{{ $homeArtwork | safeURL }}" alt="" loading="lazy" />
                            </span>
                            <span class="pokemon-art-tile-label">Home</span>
                          </span>
                        {{ end }}
                        {{ if ne $homeArtworkShiny "" }}
                          <span class="pokemon-art-tile">
                            <span class="pokemon-art-tile-media">
                              <img src="{{ $homeArtworkShiny | safeURL }}" alt="" loading="lazy" />
                            </span>
                            <span class="pokemon-art-tile-label">Home Shiny</span>
                          </span>
                        {{ end }}
                        {{ if ne $dreamWorldArtwork "" }}
                          <span class="pokemon-art-grid-full">
                            <span class="pokemon-art-tile">
                              <span class="pokemon-art-tile-media">
                                <img src="{{ $dreamWorldArtwork | safeURL }}" alt="" loading="lazy" />
                              </span>
                              <span class="pokemon-art-tile-label">Dream World</span>
                            </span>
                          </span>
                        {{ end }}
                      </span>
                    {{ end }}
                    {{ if $hasCryBlock }}
                      {{ if $hasArtworkGallery }}<span class="pokemon-name-popover-divider"></span>{{ end }}
                      <span class="pokemon-art-section-heading">Cries</span>
                      <span class="pokemon-cry-chips">
                        {{ if ne $cryLatest "" }}
                          <button
                            class="pokemon-cry-chip"
                            type="button"
                            data-cry-chip="latest"
                            onclick="(function(btn){
                              var wrap=btn.closest('.pokemon-art-popover');
                              if(!wrap)return;
                              var latest=wrap.querySelector('[data-pokemon-cry=latest]');
                              var legacy=wrap.querySelector('[data-pokemon-cry=legacy]');
                              if(!latest)return;
                              latest.volume=0.22;
                              if(latest.paused){ if(legacy){ legacy.pause(); legacy.currentTime=0; } latest.play(); btn.textContent='Pause Latest'; }
                              else { latest.pause(); latest.currentTime=0; btn.textContent='Latest'; }
                              var other=wrap.querySelector('[data-cry-chip=legacy]');
                              if(other){ other.textContent='Legacy'; }
                            })(this)">
                            Latest
                          </button>
                          <audio
                            preload="none"
                            data-pokemon-cry="latest"
                            src="{{ $cryLatest | safeURL }}"
                            onended="(function(audio){ var wrap=audio.closest('.pokemon-art-popover'); if(!wrap)return; var latestBtn=wrap.querySelector('[data-cry-chip=latest]'); if(latestBtn){ latestBtn.textContent='Latest'; } var legacyBtn=wrap.querySelector('[data-cry-chip=legacy]'); if(legacyBtn){ legacyBtn.textContent='Legacy'; } })(this)">
                          </audio>
                        {{ end }}
                        {{ if ne $cryLegacy "" }}
                          <button
                            class="pokemon-cry-chip"
                            type="button"
                            data-cry-chip="legacy"
                            onclick="(function(btn){
                              var wrap=btn.closest('.pokemon-art-popover');
                              if(!wrap)return;
                              var latest=wrap.querySelector('[data-pokemon-cry=latest]');
                              var legacy=wrap.querySelector('[data-pokemon-cry=legacy]');
                              if(!legacy)return;
                              legacy.volume=0.22;
                              if(legacy.paused){ if(latest){ latest.pause(); latest.currentTime=0; } legacy.play(); btn.textContent='Pause Legacy'; }
                              else { legacy.pause(); legacy.currentTime=0; btn.textContent='Legacy'; }
                              var other=wrap.querySelector('[data-cry-chip=latest]');
                              if(other){ other.textContent='Latest'; }
                            })(this)">
                            Legacy
                          </button>
                          <audio
                            preload="none"
                            data-pokemon-cry="legacy"
                            src="{{ $cryLegacy | safeURL }}"
                            onended="(function(audio){ var wrap=audio.closest('.pokemon-art-popover'); if(!wrap)return; var latestBtn=wrap.querySelector('[data-cry-chip=latest]'); if(latestBtn){ latestBtn.textContent='Latest'; } var legacyBtn=wrap.querySelector('[data-cry-chip=legacy]'); if(legacyBtn){ legacyBtn.textContent='Legacy'; } })(this)">
                          </audio>
                        {{ end }}
                      </span>
                    {{ end }}
                    {{ if $hasArtworkMeta }}
                      {{ if or $hasArtworkGallery $hasCryBlock }}<span class="pokemon-name-popover-divider"></span>{{ end }}
                      <span class="pokemon-art-section-heading">Details</span>
                      <span class="pokemon-art-meta">
                        {{ if ne $selectedGenus "" }}
                          <span class="pokemon-art-meta-row">
                            <span class="pokemon-art-meta-label">Genus</span>
                            <span class="pokemon-art-meta-value">{{ $selectedGenus }}</span>
                          </span>
                        {{ end }}
                        {{ if ne $generationLabel "" }}
                          <span class="pokemon-art-meta-row">
                            <span class="pokemon-art-meta-label">Generation</span>
                            <span class="pokemon-art-meta-value">{{ $generationLabel }}</span>
                          </span>
                        {{ end }}
                        {{ if ne $captureRateLabel "" }}
                          <span class="pokemon-art-meta-row">
                            <span class="pokemon-art-meta-label">Capture Rate</span>
                            <span class="pokemon-art-meta-value">{{ $captureRateLabel }}</span>
                          </span>
                        {{ end }}
                        {{ if ne $genderLabel "" }}
                          <span class="pokemon-art-meta-row">
                            <span class="pokemon-art-meta-label">Gender</span>
                            <span class="pokemon-art-meta-value">{{ $genderLabel }}</span>
                          </span>
                        {{ end }}
                        {{ if ne $formsLabel "" }}
                          <span class="pokemon-art-meta-row">
                            <span class="pokemon-art-meta-label">Forms</span>
                            <span class="pokemon-art-meta-value">{{ $formsLabel }}</span>
                          </span>
                        {{ end }}
                      </span>
                    {{ end }}
                    {{ if ne $selectedFlavorText "" }}
                      {{ if or $hasArtworkGallery $hasCryBlock $hasArtworkMeta }}<span class="pokemon-name-popover-divider"></span>{{ end }}
                      <span class="pokemon-art-section-heading">Pokédex Entry</span>
                      <span class="pokemon-art-flavor">{{ $selectedFlavorText }}</span>
                    {{ end }}
                  </span>
                </span>
              {{ end }}
            </div>

            <div>
              <div class="pokemon-heading">
                <span
                  class="pokemon-name-trigger{{ if $hasLocalizedNames }} has-popover{{ end }}"
                  {{ if $hasLocalizedNames }}data-popover-type="html" data-popover-position="above" data-popover-max-width="24rem" data-popover-show-delay="250"{{ end }}
                >
                  <span class="pokemon-name size-h3 color-highlight">{{ $displayName }}</span>
                  {{ if $hasLocalizedNames }}
                    <span data-popover-html>
                      <span class="pokemon-name-popover">
                        <span class="pokemon-name-popover-header">
                          <span class="pokemon-name-popover-title">{{ $englishName }}</span>
                          <span class="pokemon-name-popover-number">#{{ printf "%03d" ($pokemon.JSON.Int "id") }}</span>
                        </span>
                        <span class="pokemon-name-popover-divider"></span>
                        <span class="pokemon-name-list">
                          {{ range $localizedNames }}
                            {{ $languageName := .String "language.name" }}
                            {{ $flag := "🌐" }}
                            {{ $languageLabel := $languageName }}
                            {{ if eq $languageName "en" }}{{ $flag = "🇬🇧" }}
                            {{ $languageLabel = "English" }}
                            {{ else if eq $languageName "ja" }}{{ $flag = "🇯🇵" }}
                            {{ $languageLabel = "日本語" }}
                            {{ else if or (eq $languageName "ja-Hrkt") (eq $languageName "ja-hrkt") }}{{ $flag = "🇯🇵" }}
                            {{ $languageLabel = "にほんご" }}
                            {{ else if or (eq $languageName "roomaji") (eq $languageName "ja-Roma") (eq $languageName "ja-roma") }}{{ $flag = "🇯🇵" }}
                            {{ $languageLabel = "Romaji" }}
                            {{ else if eq $languageName "ko" }}{{ $flag = "🇰🇷" }}
                            {{ $languageLabel = "한국어" }}
                            {{ else if or (eq $languageName "zh-Hant") (eq $languageName "zh-hant") }}{{ $flag = "🇹🇼" }}
                            {{ $languageLabel = "繁體中文" }}
                            {{ else if or (eq $languageName "zh-Hans") (eq $languageName "zh-hans") }}{{ $flag = "🇨🇳" }}
                            {{ $languageLabel = "简体中文" }}
                            {{ else if eq $languageName "fr" }}{{ $flag = "🇫🇷" }}
                            {{ $languageLabel = "Français" }}
                            {{ else if eq $languageName "de" }}{{ $flag = "🇩🇪" }}
                            {{ $languageLabel = "Deutsch" }}
                            {{ else if eq $languageName "es" }}{{ $flag = "🇪🇸" }}
                            {{ $languageLabel = "Español" }}
                            {{ else if eq $languageName "it" }}{{ $flag = "🇮🇹" }}
                            {{ $languageLabel = "Italiano" }}
                            {{ else if eq $languageName "cs" }}{{ $flag = "🇨🇿" }}
                            {{ $languageLabel = "Čeština" }}
                            {{ end }}
                            <span class="pokemon-name-row">
                              <span class="pokemon-name-language">{{ $flag }} {{ $languageLabel }}</span>
                              <span class="pokemon-name-value">{{ .String "name" }}</span>
                            </span>
                          {{ end }}
                        </span>
                      </span>
                    </span>
                  {{ end }}
                </span>
                <span class="pokemon-number size-h5">#{{ printf "%03d" ($pokemon.JSON.Int "id") }}</span>
              </div>
            </div>

            {{ if or $isLegendary $isMythical }}
              <div class="pokemon-badges">
                {{ if $isLegendary }}<span class="pokemon-badge pokemon-badge-legendary">Legendary</span>{{ end }}
                {{ if $isMythical }}<span class="pokemon-badge pokemon-badge-mythical">Mythical</span>{{ end }}
              </div>
            {{ end }}

            <div class="pokemon-types">
              {{ range $pokemon.JSON.Array "types" }}
                <span class="pokemon-type type-{{ .String "type.name" }}">{{ .String "type.name" }}</span>
              {{ end }}
            </div>

            <div class="pokemon-divider"></div>

            <div class="pokemon-stats">
              {{ range $pokemon.JSON.Array "stats" }}
                {{ $s := .String "stat.name" }}
                <div class="pokemon-stat">
                  <div class="size-h6 uppercase color-subdue">
                    {{ if eq $s "hp" }}HP{{ else if eq $s "attack" }}Atk{{ else if eq $s "defense" }}Def{{ else if eq $s "special-attack" }}Sp. Atk{{ else if eq $s "special-defense" }}Sp. Def{{ else if eq $s "speed" }}Speed{{ else }}Stat{{ end }}
                  </div>
                  <div class="pokemon-stat-value size-h4 color-highlight">{{ .Int "base_stat" }}</div>
                </div>
              {{ end }}
            </div>

            <div class="pokemon-divider"></div>

            <div class="pokemon-meta">
              <div class="pokemon-meta-item">
                <div class="size-h6 color-subdue">Height</div>
                <div class="pokemon-meta-value color-highlight">
                  {{ printf "%.1f" (div (toFloat ($pokemon.JSON.Int "height")) 10.0) }}
                  <span class="pokemon-meta-unit">m</span>
                </div>
              </div>
              <div class="pokemon-meta-item">
                <div class="size-h6 color-subdue">Weight</div>
                <div class="pokemon-meta-value color-highlight">
                  {{ printf "%.1f" (div (toFloat ($pokemon.JSON.Int "weight")) 10.0) }}
                  <span class="pokemon-meta-unit">kg</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      {{ else }}
        <div class="text-center margin-block-3">
          <div class="color-negative size-h4">Random Pokémon unavailable</div>
          <div class="color-subdue size-h6">The PokéAPI entry could not be loaded right now.</div>
          <div class="color-subdue size-h6">{{ $pokemon.Response.Status }}</div>
        </div>
      {{ end }}
    {{ end }}
