        background: linear-gradient(135deg, var(--pokemon-accent-secondary, rgba(255, 139, 209, 0.14)), rgba(255, 139, 209, 0.14));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
