      .pokemon-badges,
      .pokemon-types {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.45rem;
      }

      .pokemon-badge,
      .pokemon-type {
        border-radius: 999px;
        padding: 0.28rem 0.72rem;
        font-size: 0.78rem;
        line-height: 1.25;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .pokemon-badge {
        background: var(--color-widget-background-highlight);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .pokemon-badge-legendary {
        color: #ffe08a;
        background: linear-gradient(135deg, var(--pokemon-accent-primary-soft, rgba(255, 209, 102, 0.12)), rgba(255, 209, 102, 0.16));
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
      }

      .pokemon-badge-mythical {
