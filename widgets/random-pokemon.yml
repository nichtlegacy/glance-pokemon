- type: custom-api
  title: Random Pokémon
  cache: 5m
  options:
    # Pokédex ranges by generation:
    # Gen 1: 1-151
    # Gen 2: 152-251
    # Gen 3: 252-386
    # Gen 4: 387-493
    # Gen 5: 494-649
    # Gen 6: 650-721
    # Gen 7: 722-809
    # Gen 8: 810-905
    # Gen 9: 906-1025
    # Display language codes:
    # en, de, fr, es, it, ja, ja-Hrkt, roomaji, ko, zh-Hans, zh-Hant, cs
    # Falls back to English when a localized species name is unavailable.
    min-id: 1
    max-id: 1025
    language: en
  template: |
    {{ $configuredMin := .Options.IntOr "min-id" 1 }}
    {{ $configuredMax := .Options.IntOr "max-id" 1025 }}
    {{ $selectedLanguage := trimSpace (.Options.StringOr "language" "en") }}
    {{ $selectedLanguageAlt1 := "" }}
    {{ $selectedLanguageAlt2 := "" }}
    {{ $selectedLanguageAlt3 := "" }}
    {{ $minID := $configuredMin }}
    {{ $maxID := $configuredMax }}
    {{ if eq $selectedLanguage "" }}{{ $selectedLanguage = "en" }}{{ end }}
    {{ if eq $selectedLanguage "ja-Hrkt" }}{{ $selectedLanguageAlt1 = "ja-hrkt" }}
    {{ else if eq $selectedLanguage "ja-hrkt" }}{{ $selectedLanguageAlt1 = "ja-Hrkt" }}
    {{ else if eq $selectedLanguage "ja-Roma" }}{{ $selectedLanguageAlt1 = "ja-roma" }}{{ $selectedLanguageAlt2 = "roomaji" }}{{ $selectedLanguageAlt3 = "ja" }}
    {{ else if eq $selectedLanguage "ja-roma" }}{{ $selectedLanguageAlt1 = "ja-Roma" }}{{ $selectedLanguageAlt2 = "roomaji" }}{{ $selectedLanguageAlt3 = "ja" }}
    {{ else if eq $selectedLanguage "roomaji" }}{{ $selectedLanguageAlt1 = "ja-Roma" }}{{ $selectedLanguageAlt2 = "ja-roma" }}{{ $selectedLanguageAlt3 = "ja" }}
    {{ else if eq $selectedLanguage "ja" }}{{ $selectedLanguageAlt1 = "ja-Hrkt" }}{{ $selectedLanguageAlt2 = "ja-hrkt" }}
    {{ else if eq $selectedLanguage "zh-Hant" }}{{ $selectedLanguageAlt1 = "zh-hant" }}
    {{ else if eq $selectedLanguage "zh-hant" }}{{ $selectedLanguageAlt1 = "zh-Hant" }}
    {{ else if eq $selectedLanguage "zh-Hans" }}{{ $selectedLanguageAlt1 = "zh-hans" }}
    {{ else if eq $selectedLanguage "zh-hans" }}{{ $selectedLanguageAlt1 = "zh-Hans" }}
    {{ end }}
    {{ if lt $minID 1 }}{{ $minID = 1 }}{{ end }}
    {{ if lt $maxID 1 }}{{ $maxID = 1 }}{{ end }}
    {{ if gt $minID 1025 }}{{ $minID = 1025 }}{{ end }}
    {{ if gt $maxID 1025 }}{{ $maxID = 1025 }}{{ end }}
    {{ if gt $minID $maxID }}
      {{ $swap := $minID }}
      {{ $minID = $maxID }}
      {{ $maxID = $swap }}
    {{ end }}
    {{ $randomStatus := 200 }}
    {{ $pokemonId := $minID }}
    {{ if ne $minID $maxID }}
      {{ $random := newRequest (concat "https://www.randomnumberapi.com/api/v1.0/random?min=" (printf "%d" $minID) "&max=" (printf "%d" $maxID) "&count=1") | getResponse }}
      {{ $randomStatus = $random.Response.StatusCode }}
      {{ $pokemonId = $random.JSON.Int "0" }}
    {{ end }}

    <style>
